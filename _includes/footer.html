<footer class="site-footer">

  <div class="footer-inner">
    <p class="footer-tagline">{{ site.tagline }}</p>

    <nav class="footer-nav" aria-label="Footer navigation">
      <a href="{{ '/about/' | prepend: site.baseurl }}">About</a>
      <a href="{{ '/contact/' | prepend: site.baseurl }}">Contact</a>
      <a href="{{ '/privacy/' | prepend: site.baseurl }}">Privacy</a>
      <a href="{{ '/start-here/' | prepend: site.baseurl }}">Start Here</a>

    <p class="footer-copy">&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
  </div>
</footer>
