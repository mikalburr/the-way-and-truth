<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}

  <main class="site-main{% if page.sidebar %} has-sidebar{% endif %}">
    <div class="main-content">
      {{ content }}
    </div>
    {% if page.sidebar %}
    <aside class="sidebar">
      {% include ad_unit.html slot="sidebar" %}
    </aside>
    {% endif %}
  </main>

  {% include footer.html %}
  <script src="{{ '/assets/js/ad-inject.js' | relative_url }}" defer></script>

  {% if page.url == '/' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title | escape }}",
    "url": "{{ site.url }}",
    "description": "{{ site.description | escape }}",
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title | escape }}",
      "url": "{{ site.url }}"
    }
  }
  </script>
  {% endif %}
</body>
</html>
